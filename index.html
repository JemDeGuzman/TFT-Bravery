<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Set Randomizer</title>
    <style>
        /* 1. Theme Variables Configuration */
        :root {
            --bg-color: #f8f9fa;
            --text-color: #333333;
            --card-bg: #ffffff;
            --card-border: #cccccc;
            --card-shadow: rgba(0, 0, 0, 0.05);
            --btn-bg: #ffffff;
            --btn-text: #333333;
            --btn-border: #cccccc;
            --badge-bg: #e9ecef;
            --badge-text: #495057;
            --badge-shadow: rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #f8f9fa;
            --card-bg: #1e1e1e;
            --card-border: #333333;
            --card-shadow: rgba(0, 0, 0, 0.4);
            --btn-bg: #2d2d2d;
            --btn-text: #f8f9fa;
            --btn-border: #444444;
            --badge-bg: #2d2d2d;
            --badge-text: #e0e0e0;
            --badge-shadow: rgba(0, 0, 0, 0.3);
        }

        /* 2. Global & Structural Styles */
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 50px; 
            background-color: var(--bg-color); 
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        /* Floating Theme Switcher Button */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 12px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 20px;
            border: 1px solid var(--btn-border);
            background-color: var(--btn-bg);
            color: var(--btn-text);
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .controls { margin-bottom: 20px; }
        .set-btn { 
            padding: 8px 16px; 
            margin: 0 5px; 
            font-size: 14px; 
            cursor: pointer; 
            border: 1px solid var(--btn-border); 
            border-radius: 4px; 
            background-color: var(--btn-bg);
            color: var(--btn-text);
            transition: all 0.2s ease;
        }
        .set-btn.active { background-color: #007bff; color: white; border: 1px solid #0056b3; }
        
        #card { 
            margin: 20px auto; 
            padding: 20px; 
            border: 1px solid var(--card-border); 
            max-width: 300px; 
            border-radius: 8px; 
            min-height: 200px; 
            background-color: var(--card-bg); 
            box-shadow: 0 4px 6px var(--card-shadow); 
            transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        #display-image { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #007bff; margin-bottom: 10px; }
        
        #random-btn { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-top: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; }
        #random-btn:disabled { background-color: #6c757d; cursor: not-allowed; }
        .hidden { display: none; }

        /* 3. Synergy Trait Badges (High Visibility) */
        #display-roles { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 10px; 
            margin-top: 15px; 
        }
        .trait-badge {
            background-color: var(--badge-bg);
            color: var(--badge-text);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 1px 3px var(--badge-shadow);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
    </style>
</head>
<body>

    <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()">🌙 Dark Mode</button>

    <h1>Multi-Set Randomizer</h1>

    <div class="controls">
        <button class="set-btn active" onclick="switchSet('set-17', event)">Set 17</button>
        <button class="set-btn" onclick="switchSet('set-18', event)">Set 18</button>
    </div>

    <div id="card">
        <div id="card-content">
            <img id="display-image" src="" alt="">
            <h2 id="display-name">---</h2>
            <div id="display-roles">---</div>
        </div>
        <div id="unavailable-message" class="hidden">
            <h3 style="color: #dc3545;">Set Unavailable</h3>
            <p>This data set is currently empty or missing.</p>
        </div>
    </div>

    <button id="random-btn">Pick Random</button>

    <script src="script.js"></script>
    
    <script>
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const themeBtn = document.getElementById('theme-btn');
            
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                themeBtn.textContent = '🌙 Dark Mode';
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeBtn.textContent = '☀️ Light Mode';
                localStorage.setItem('theme', 'dark');
            }
        }

        // On page load, remember user choice
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('theme-btn').textContent = '☀️ Light Mode';
        }
    </script>
</body>
</html>
