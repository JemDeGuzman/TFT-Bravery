<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Set Randomizer</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        .controls { margin-bottom: 20px; }
        .set-btn { padding: 8px 16px; margin: 0 5px; font-size: 14px; cursor: pointer; }
        .set-btn.active { background-color: #007bff; color: white; border: 1px solid #0056b3; }
        #card { margin: 20px auto; padding: 20px; border: 1px solid #ccc; max-width: 300px; border-radius: 8px; min-height: 200px; }
        #display-image { width: 100%; height: auto; border-radius: 4px; }
        #random-btn { padding: 10px 20px; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <h1>Multi-Set Randomizer</h1>

    <!-- 1. Controls to switch sets -->
    <div class="controls">
        <button class="set-btn active" onclick="switchSet('set-17')">Set 17</button>
        <button class="set-btn" onclick="switchSet('set-18')">Set 18</button>
    </div>

    <!-- 2. Main content container -->
    <div id="card">
        <div id="card-content">
            <img id="display-image" src="" alt="">
            <h2 id="display-name">---</h2>
            <p id="display-roles">---</p>
        </div>
        <!-- 3. Message displayed if a set is unavailable -->
        <div id="unavailable-message" class="hidden">
            <h3 style="color: #dc3545;">Set Unavailable</h3>
            <p>This data set is currently empty or missing.</p>
        </div>
    </div>

    <button id="random-btn">Pick Random</button>

    <script src="script.js"></script>
</body>
</html>
